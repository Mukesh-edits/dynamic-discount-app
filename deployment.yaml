apiVersion: apps/v1
kind: Deployment
metadata:
  name: discount-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discount-app
  template:
    metadata:
      labels:
        app: discount-app
    spec:
      containers:
      - name: discount-app
        image: mukesh20050605/dynamic-discount-app:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: discount-service
spec:
  type: NodePort
  selector:
    app: discount-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
    nodePort: 30011        # ← changed from 30010 to 30011